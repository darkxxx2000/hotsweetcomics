<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Viewer - HOT SWEET COMICS</title>

<link rel="stylesheet" href="css/estilos.css">
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@9.4.0/dist/panzoom.min.js"></script>

<style>
body{
  background: linear-gradient(135deg,#0f0c1a,#1a1840,#12122a);
}

/* MINIATURAS */
#thumbGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(110px,1fr));
  gap: 10px;
  padding: 30px;
}

#thumbGrid img {
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  border: 2px solid #ff00c8;
  transition: 0.3s;
}

#thumbGrid img:hover{
  transform: scale(1.05);
  box-shadow: 0 0 10px #ff00c8;
}

/* VIEWER */
#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#viewer img {
  max-width: 90%;
  max-height: 90%;
  cursor: grab;
  border-radius: 12px;
  box-shadow: 0 0 25px #000;
}

#closeBtn {
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
  z-index:10000;
}
</style>
</head>

<body>

<header>
  <h1>HOT SWEET COMICS</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="doujinshi.html">Doujinshi</a>
    <a href="gallery.html">Gallery</a>
    <a href="shortcomics.html">Short Comics</a>
    <a href="post.html">Post</a>
    <a href="ai.html">AI</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <section id="thumbGrid"></section>
</main>

<div id="viewer">
  <div id="closeBtn">&times;</div>
  <img id="bigImg">
</div>

<footer style="text-align:center;margin:40px 0;">
  <a href="#">Usage</a> |
  <a href="#">Privacy Policy</a> |
  <a href="#">Terms & Conditions</a>
</footer>

<script>
const params = new URLSearchParams(location.search);
const serieID = params.get("serie");
const capIndex = Number(params.get("cap"));

fetch("data/data.json")
.then(res => res.json())
.then(data => {

  const serie = data.series.find(s => String(s.id) === String(serieID));
  if (!serie) return;

  const cap = serie.capitulos[capIndex];
  if (!cap) return;

  const images = cap.imagenes;

  const grid = document.getElementById("thumbGrid");
  const viewer = document.getElementById("viewer");
  const bigImg = document.getElementById("bigImg");

  let current = 0;
  let pan = null;
  let clickStart = 0;

  // MINIATURAS
  images.forEach((src,i) => {
    const img = document.createElement("img");
    img.src = src;

    img.onclick = () => {
      current = i;
      openViewer();
    };

    grid.appendChild(img);
  });

  function openViewer(){
    bigImg.src = images[current];
    viewer.style.display = "flex";

    if (pan) pan.destroy();

    pan = Panzoom(bigImg, {
      maxScale:6,
      minScale:1
    });

    // ZOOM CON RUEDA
    viewer.onwheel = (e) => {
      e.preventDefault();
      pan.zoomWithWheel(e);
    };
  }

  function next(){
    if(current < images.length - 1){
      current++;
      openViewer();
    }
  }

  function prev(){
    if(current > 0){
      current--;
      openViewer();
    }
  }

  // CLICK vs DRAG
  bigImg.addEventListener("mousedown", () => {
    clickStart = Date.now();
  });

  bigImg.addEventListener("mouseup", () => {
    const diff = Date.now() - clickStart;
    if(diff < 200){
      next();
    }
  });

  // TECLADO
  document.addEventListener("keydown", e => {
    if(viewer.style.display === "flex"){

      if(e.key === "ArrowRight") next();
      if(e.key === "ArrowLeft") prev();
      if(e.key === "Escape") viewer.style.display = "none";

    }
  });

  // CERRAR
  document.getElementById("closeBtn").onclick = () => {
    viewer.style.display = "none";
  };

})
.catch(err => {
  console.error("Error cargando JSON:", err);
});
</script>

</body>
</html>
