<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Viewer - HOT SWEET COMICS</title>

<link rel="stylesheet" href="css/estilos.css">

<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@9.4.0/dist/panzoom.min.js"></script>

<style>
#thumbGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(110px,1fr));
  gap: 10px;
  padding: 30px;
}

#thumbGrid img {
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  border: 2px solid #ff00c8;
  transition: 0.3s;
}

#thumbGrid img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #ff00c8;
}

#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#viewer img {
  max-width: 90%;
  max-height: 90%;
  cursor: grab;
}

#closeBtn {
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>HOT SWEET COMICS</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="doujinshi.html">Doujinshi</a>
    <a href="gallery.html">Gallery</a>
    <a href="shortcomics.html">Short Comics</a>
    <a href="post.html">Post</a>
    <a href="ai.html">AI</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <section id="thumbGrid"></section>
</main>

<div id="viewer">
  <div id="closeBtn">&times;</div>
  <img id="bigImg">
</div>

<footer style="text-align:center;margin:40px 0;">
  <a href="usage.html">Usage</a> |
  <a href="privacy.html">Privacy Policy</a> |
  <a href="terms.html">Terms & Conditions</a>
</footer>

<script>
const params = new URLSearchParams(location.search);
const serieID = params.get("serie");
const capIndex = Number(params.get("cap"));

let images = [];
let current = 0;

let viewer = document.getElementById("viewer");
let bigImg = document.getElementById("bigImg");
let grid = document.getElementById("thumbGrid");

let pan = null;

// 🔥 cargar data
fetch("data/data.json")
.then(res => res.json())
.then(data => {

  const serie = data.series.find(s => String(s.id) === String(serieID));
  if (!serie) return;

  const cap = serie.capitulos[capIndex];
  if (!cap) return;

  images = cap.imagenes;

  // thumbnails
  images.forEach((src,i) => {
    const img = document.createElement("img");
    img.src = src;

    img.onclick = () => openViewer(i);

    grid.appendChild(img);
  });

});

// 🔥 abrir viewer
function openViewer(index){
  current = index;

  viewer.style.display = "flex";
  bigImg.src = images[current];

  // destruir pan anterior
  if (pan) pan.destroy();

  pan = Panzoom(bigImg, {
    maxScale: 5,
    minScale: 1
  });

  // IMPORTANTE: evitar duplicar wheel listener
  bigImg.parentElement.onwheel = pan.zoomWithWheel;
}

// cerrar
document.getElementById("closeBtn").onclick = () => {
  viewer.style.display = "none";
};

// teclado
document.addEventListener("keydown", e => {

  if (viewer.style.display !== "flex") return;

  if (e.key === "ArrowRight") {
    if (current < images.length - 1) {
      openViewer(current + 1);
    }
  }

  if (e.key === "ArrowLeft") {
    if (current > 0) {
      openViewer(current - 1);
    }
  }

  if (e.key === "Escape") {
    viewer.style.display = "none";
  }

});
</script>

</body>
</html>
