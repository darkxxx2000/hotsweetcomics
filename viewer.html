<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Viewer - HOT SWEET COMICS</title>

<link rel="stylesheet" href="css/estilos.css">
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@9.4.0/dist/panzoom.min.js"></script>

<style>
body{
  background: linear-gradient(135deg,#0f0c1a,#1a1840,#12122a);
}

/* BOTONES */
#controls{
  text-align:center;
  margin:20px;
}

.ctrl-btn{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ff0080;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

.ctrl-btn:hover{
  background:#e60073;
}

/* GRID MINIATURAS */
#thumbGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(110px,1fr));
  gap: 10px;
  padding: 30px;
}

#thumbGrid img {
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  border: 2px solid #ff00c8;
}

/* WEBTOON */
#webtoon {
  display:none;
  max-width:900px;
  margin:auto;
}

#webtoon img{
  width:100%;
  margin-bottom:10px;
}

/* VIEWER NORMAL */
#viewer {
  display:none;
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(6px);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#viewer img {
  max-width:90%;
  max-height:90%;
  cursor: grab;
}

#closeBtn {
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>HOT SWEET COMICS</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="doujinshi.html">Doujinshi</a>
    <a href="gallery.html">Gallery</a>
    <a href="shortcomics.html">Short Comics</a>
    <a href="post.html">Post</a>
    <a href="ai.html">AI</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div id="controls">
  <button class="ctrl-btn" id="btnNormal">Normal</button>
  <button class="ctrl-btn" id="btnWebtoon">Webtoon</button>
</div>

<main>
  <section id="thumbGrid"></section>
  <section id="webtoon"></section>
</main>

<div id="viewer">
  <div id="closeBtn">&times;</div>
  <img id="bigImg">
</div>

<script>
const params = new URLSearchParams(location.search);
const serieID = params.get("serie");
const capIndex = Number(params.get("cap"));

fetch("data/data.json")
.then(res => res.json())
.then(data => {

  const serie = data.series.find(s => String(s.id) === String(serieID));
  if (!serie) return;

  const cap = serie.capitulos[capIndex];
  if (!cap) return;

  const images = cap.imagenes;

  const grid = document.getElementById("thumbGrid");
  const webtoon = document.getElementById("webtoon");
  const viewer = document.getElementById("viewer");
  const bigImg = document.getElementById("bigImg");

  let current = 0;
  let pan = null;
  let clickStart = 0;

  // ===== MINIATURAS =====
  images.forEach((src,i)=>{
    const img=document.createElement("img");
    img.src=src;

    img.onclick=()=>{
      current=i;
      openViewer();
    };

    grid.appendChild(img);
  });

  // ===== WEBTOON =====
  images.forEach(src=>{
    const img=document.createElement("img");
    img.src=src;
    webtoon.appendChild(img);
  });

  // ===== MODOS =====
  document.getElementById("btnWebtoon").onclick=()=>{
    grid.style.display="none";
    webtoon.style.display="block";
  };

  document.getElementById("btnNormal").onclick=()=>{
    grid.style.display="grid";
    webtoon.style.display="none";
  };

  // ===== VIEWER =====
  function openViewer(){
    bigImg.src = images[current];
    viewer.style.display = "flex";

    if (pan) pan.destroy();

    pan = Panzoom(bigImg,{
      maxScale:6,
      minScale:1
    });

    // 🔥 FIX DEFINITIVO ZOOM RUEDA
    viewer.addEventListener("wheel", (e)=>{
      e.preventDefault();
      pan.zoomWithWheel(e);
    }, { passive:false });
  }

  function next(){
    if(current < images.length-1){
      current++;
      openViewer();
    }
  }

  function prev(){
    if(current > 0){
      current--;
      openViewer();
    }
  }

  // CLICK vs DRAG
  bigImg.addEventListener("mousedown",()=> clickStart=Date.now());

  bigImg.addEventListener("mouseup",()=>{
    if(Date.now()-clickStart < 200){
      next();
    }
  });

  // TECLADO
  document.addEventListener("keydown", e=>{
    if(viewer.style.display==="flex"){
      if(e.key==="ArrowRight") next();
      if(e.key==="ArrowLeft") prev();
      if(e.key==="Escape") viewer.style.display="none";
    }
  });

  // CERRAR
  document.getElementById("closeBtn").onclick=()=>{
    viewer.style.display="none";
  };

});
</script>

</body>
</html>
