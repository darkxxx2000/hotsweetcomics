<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Viewer - HOT SWEET COMICS</title>

<link rel="stylesheet" href="css/estilos.css">

<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@9.4.0/dist/panzoom.min.js"></script>

<style>
body{
  margin:0;
}

/* GRID */
#thumbGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(110px,1fr));
  gap: 10px;
  padding: 30px;
}

#thumbGrid img {
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  border: 2px solid #ff00c8;
  transition: 0.3s;
}

#thumbGrid img:hover{
  transform: scale(1.05);
  box-shadow: 0 0 10px #ff00c8;
}

/* VIEWER */
#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 9999;
  overflow: auto;
}

/* IMAGE */
#viewer img {
  max-width: 90%;
  max-height: 90%;
  cursor: grab;
  touch-action: none; /* 🔥 FIX ZOOM */
}

/* CONTROLES */
#controls{
  position: fixed;
  top:10px;
  left:10px;
  z-index:10000;
  display:flex;
  gap:10px;
}

button{
  background:#ff00c8;
  border:none;
  color:white;
  padding:8px 12px;
  cursor:pointer;
}

/* WEBTOON */
#webtoonContainer img{
  width:90%;
  margin:10px 0;
}

/* CLOSE */
#closeBtn {
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>HOT SWEET COMICS</h1>
</header>

<main>
  <section id="thumbGrid"></section>
</main>

<!-- VIEWER -->
<div id="viewer">

  <div id="closeBtn">&times;</div>

  <div id="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
    <button onclick="resetZoom()">Reset</button>
    <button onclick="toggleWebtoon()">Webtoon</button>
  </div>

  <div style="display:flex;justify-content:center;align-items:center;height:100%;">
    <img id="bigImg">
  </div>

</div>

<footer style="text-align:center;margin:40px 0;">
  <a href="usage.html">Usage</a> |
  <a href="privacy.html">Privacy Policy</a> |
  <a href="terms.html">Terms & Conditions</a>
</footer>

<script>

const params = new URLSearchParams(location.search);
const serieID = params.get("serie");
const capIndex = Number(params.get("cap"));

let images = [];
let current = 0;
let pan = null;
let webtoonMode = false;

const viewer = document.getElementById("viewer");
const bigImg = document.getElementById("bigImg");
const grid = document.getElementById("thumbGrid");

// LOAD DATA
fetch("data/data.json")
.then(res => res.json())
.then(data => {

  const serie = data.series.find(s => String(s.id) === String(serieID));
  if (!serie) return;

  const cap = serie.capitulos[capIndex];
  if (!cap) return;

  images = cap.imagenes;

  images.forEach((src,i) => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => openViewer(i);
    grid.appendChild(img);
  });

});

// OPEN VIEWER
function openViewer(index){
  current = index;
  viewer.style.display = "block";

  if(webtoonMode) return;

  bigImg.style.display = "block";
  bigImg.src = images[current];

  if (pan) {
    pan.destroy();
    pan = null;
  }

  bigImg.style.transform = "scale(1)";

  pan = Panzoom(bigImg, {
    maxScale: 5,
    minScale: 1
  });

  const container = bigImg.parentElement;

  // 🔥 FIX REAL DEL ZOOM
  container.addEventListener("wheel", function(e){
    e.preventDefault();
    pan.zoomWithWheel(e);
  }, { passive:false });
}

// ZOOM BUTTONS
function zoomIn(){ if(pan) pan.zoomIn(); }
function zoomOut(){ if(pan) pan.zoomOut(); }
function resetZoom(){ if(pan) pan.reset(); }

// WEBTOON MODE
function toggleWebtoon(){
  webtoonMode = !webtoonMode;

  if(webtoonMode){

    bigImg.style.display = "none";

    let cont = document.getElementById("webtoonContainer");
    if(cont) cont.remove();

    cont = document.createElement("div");
    cont.id = "webtoonContainer";
    cont.style.textAlign = "center";

    images.forEach(src=>{
      const img = document.createElement("img");
      img.src = src;
      cont.appendChild(img);
    });

    viewer.appendChild(cont);

  } else {

    const cont = document.getElementById("webtoonContainer");
    if(cont) cont.remove();

    openViewer(current);
  }
}

// CLOSE
document.getElementById("closeBtn").onclick = () => {
  viewer.style.display = "none";
};

// KEYBOARD
document.addEventListener("keydown", e => {

  if (viewer.style.display !== "block") return;

  if (!webtoonMode){

    if (e.key === "ArrowRight" && current < images.length-1) {
      openViewer(current + 1);
    }

    if (e.key === "ArrowLeft" && current > 0) {
      openViewer(current - 1);
    }

  }

  if (e.key === "Escape") {
    viewer.style.display = "none";
  }

});

</script>

</body>
</html>
