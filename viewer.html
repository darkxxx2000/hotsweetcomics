<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Viewer - HOT SWEET COMICS</title>

<!-- ✅ CSS CORREGIDO -->
<link rel="stylesheet" href="css/estilos.css">

<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@9.4.0/dist/panzoom.min.js"></script>

<style>
#thumbGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(110px,1fr));
  gap: 10px;
  padding: 30px;
}

#thumbGrid img {
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  border: 2px solid #ff00c8;
  transition: 0.3s;
}

#thumbGrid img:hover{
  transform: scale(1.05);
  box-shadow: 0 0 10px #ff00c8;
}

#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#viewer img {
  max-width: 90%;
  max-height: 90%;
  cursor: grab;
}

#closeBtn {
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>HOT SWEET COMICS</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="doujinshi.html">Doujinshi</a>
    <a href="gallery.html">Gallery</a>
    <a href="shortcomics.html">Short Comics</a>
    <a href="post.html">Post</a>
    <a href="ai.html">AI</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <section id="thumbGrid"></section>
</main>

<div id="viewer">
  <div id="closeBtn">&times;</div>
  <img id="bigImg">
</div>

<footer style="text-align:center;margin:40px 0;">
  <a href="usage.html">Usage</a> |
  <a href="privacy.html">Privacy Policy</a> |
  <a href="terms.html">Terms & Conditions</a>
</footer>

<script>
const params = new URLSearchParams(location.search);
const serieID = params.get("serie");
const capIndex = Number(params.get("cap"));

fetch("data/data.json") // ✅ ARREGLADO
.then(res => res.json())
.then(data => {

  const serie = data.series.find(s => String(s.id) === String(serieID)); // ✅ ARREGLADO
  if (!serie) return;

  const cap = serie.capitulos[capIndex];
  if (!cap) return;

  const images = cap.imagenes;
  const grid = document.getElementById("thumbGrid");
  const viewer = document.getElementById("viewer");
  const bigImg = document.getElementById("bigImg");

  let current = 0;
  let pan;

  images.forEach((src,i) => {
    const img = document.createElement("img");
    img.src = src;

    img.onclick = () => {
      current = i;
      openViewer(src);
    };

    grid.appendChild(img);
  });

  function openViewer(src){
    bigImg.src = src;
    viewer.style.display = "flex";

    if (pan) pan.destroy();
    pan = Panzoom(bigImg,{maxScale:5,minScale:1});

    bigImg.parentElement.addEventListener('wheel', pan.zoomWithWheel);
  }

  document.getElementById("closeBtn").onclick = () => {
    viewer.style.display = "none";
  };

  document.addEventListener("keydown", e => {
    if (viewer.style.display === "flex") {

      if (e.key === "ArrowRight" && current < images.length-1) {
        current++;
        openViewer(images[current]);
      }

      if (e.key === "ArrowLeft" && current > 0) {
        current--;
        openViewer(images[current]);
      }

      if (e.key === "Escape") {
        viewer.style.display = "none";
      }
    }
  });

})
.catch(err => {
  console.error("Error cargando JSON:", err);
});
</script>

</body>
</html>
