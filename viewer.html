<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Viewer - HOT SWEET COMICS</title>

<link rel="stylesheet" href="css/estilos.css">
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@9.4.0/dist/panzoom.min.js"></script>

<style>

body {
  margin:0;
}

/* GRID */
#thumbGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(110px,1fr));
  gap: 10px;
  padding: 30px;
}

#thumbGrid img {
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  border: 2px solid #ff00c8;
  transition: 0.3s;
}

#thumbGrid img:hover {
  transform: scale(1.05);
}

/* VIEWER */
#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 9999;
  overflow: auto;
}

/* PAGE MODE */
#pageMode {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
}

#bigImg {
  max-width: 90%;
  max-height: 90%;
  cursor: grab;
}

/* WEBTOON MODE */
#webtoonMode {
  display:none;
  flex-direction: column;
  align-items: center;
}

#webtoonMode img {
  width: 100%;
  max-width: 800px;
}

/* CONTROLES */
#controls {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10000;
  display:flex;
  gap:10px;
}

button {
  background:#ff00c8;
  border:none;
  color:white;
  padding:8px 12px;
  cursor:pointer;
}

#closeBtn {
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <h1>HOT SWEET COMICS</h1>
</header>

<main>
  <section id="thumbGrid"></section>
</main>

<!-- VIEWER -->
<div id="viewer">

  <div id="closeBtn">&times;</div>

  <!-- CONTROLES -->
  <div id="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
    <button onclick="resetZoom()">Reset</button>
    <button onclick="toggleMode()">Mode</button>
  </div>

  <!-- PAGE MODE -->
  <div id="pageMode">
    <img id="bigImg">
  </div>

  <!-- WEBTOON MODE -->
  <div id="webtoonMode"></div>

</div>

<script>

const params = new URLSearchParams(location.search);
const serieID = params.get("serie");
const capIndex = Number(params.get("cap"));

let images = [];
let current = 0;

let mode = "page"; // page | webtoon
let pan = null;

const viewer = document.getElementById("viewer");
const bigImg = document.getElementById("bigImg");
const webtoon = document.getElementById("webtoonMode");
const grid = document.getElementById("thumbGrid");

// LOAD DATA
fetch("data/data.json")
.then(res => res.json())
.then(data => {

  const serie = data.series.find(s => String(s.id) === String(serieID));
  if (!serie) return;

  const cap = serie.capitulos[capIndex];
  if (!cap) return;

  images = cap.imagenes;

  images.forEach((src,i) => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => openViewer(i);
    grid.appendChild(img);
  });

});

// OPEN VIEWER
function openViewer(index){
  current = index;
  viewer.style.display = "block";

  if (mode === "page") {
    showPage(index);
  } else {
    showWebtoon();
  }
}

// PAGE MODE
function showPage(index){
  webtoon.style.display = "none";
  document.getElementById("pageMode").style.display = "flex";

  bigImg.src = images[index];

  if (pan) pan.destroy();

  pan = Panzoom(bigImg, {
    maxScale: 5,
    minScale: 1
  });

  bigImg.parentElement.onwheel = e => pan.zoomWithWheel(e);
}

// WEBTOON MODE
function showWebtoon(){
  document.getElementById("pageMode").style.display = "none";
  webtoon.style.display = "flex";

  webtoon.innerHTML = "";

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    webtoon.appendChild(img);
  });
}

// ZOOM CONTROLS
function zoomIn(){ if(pan) pan.zoomIn(); }
function zoomOut(){ if(pan) pan.zoomOut(); }
function resetZoom(){ if(pan) pan.reset(); }

// SWITCH MODE
function toggleMode(){
  mode = (mode === "page") ? "webtoon" : "page";
  openViewer(current);
}

// CLOSE
document.getElementById("closeBtn").onclick = () => {
  viewer.style.display = "none";
};

// KEYBOARD
document.addEventListener("keydown", e => {

  if (viewer.style.display !== "block") return;

  if (mode === "page") {

    if (e.key === "ArrowRight" && current < images.length-1) {
      openViewer(current + 1);
    }

    if (e.key === "ArrowLeft" && current > 0) {
      openViewer(current - 1);
    }
  }

  if (e.key === "Escape") {
    viewer.style.display = "none";
  }

});

</script>

</body>
</html>
