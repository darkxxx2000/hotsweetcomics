<script>
const urlParams = new URLSearchParams(window.location.search);
const seriesId = urlParams.get('series');
const chaptersContainer = document.getElementById('chapters');

// Ejemplo: 3 capítulos por serie
const chapters = [
  {title:"Chapter 1", img:"https://ah-img.luscious.net/KOKOMIEL/370689/pagina-1.jpg", link:"viewer.html?chapter=1"},
  {title:"Chapter 2", img:"https://ah-img.luscious.net/KOKOMIEL/370689/pagina-2.jpg", link:"viewer.html?chapter=2"},
  {title:"Chapter 3", img:"https://ah-img.luscious.net/KOKOMIEL/370689/pagina-3.jpg", link:"viewer.html?chapter=3"}
];

chapters.forEach((c, idx)=>{
  const div=document.createElement('div');
  div.className='card';
  div.style.border = idx % 2 === 0 ? "3px solid #ff00c8" : "3px solid #00ffff";
  div.innerHTML=`<img src="${c.img}" alt="${c.title}"><p>${c.title}</p>`;
  div.onclick = ()=> window.location.href = c.link;
  chaptersContainer.appendChild(div);
});
</script>

</body>
