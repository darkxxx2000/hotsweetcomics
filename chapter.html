<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capítulo</title>
<link rel="stylesheet" href="estilos.css">
</head>
<body>
<header>
  <h1>Capítulo</h1>
  <hr>
</header>

<main>
  <section id="contenido"></section>
  <a id="back-comic" href="#"><button class="main-btn">Volver a Comic</button></a>
  <a href="doujinshi.html"><button class="main-btn">Volver a Doujinshi</button></a>
</main>

<script>
const contenido = document.getElementById('contenido');
const params = new URLSearchParams(window.location.search);
const serieId = params.get('id');
const capIndex = parseInt(params.get('cap'));

fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const serie = data.series.find(s => s.id === serieId);
    if (!serie) return;
    const cap = serie.capitulos[capIndex];
    if (!cap) return;
    cap.imagenes.forEach(img => {
      const el = document.createElement('img');
      el.src = img;
      el.alt = cap.titulo;
      el.className = 'chapter-img';
      contenido.appendChild(el);
    });

    // link volver a comic
    document.getElementById('back-comic').href = `comic.html?id=${serie.id}`;
  });
</script>
</body>
</html>
