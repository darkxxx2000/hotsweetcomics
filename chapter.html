<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter</title>
<style>
body{background:#000;color:#fff;font-family:Arial;padding:40px;}
img{width:100%;margin:15px 0;border-radius:8px;}
</style>
</head>
<body>

<div id="chapter"></div>

<script>
const id=new URLSearchParams(location.search).get('id');

fetch('data.json').then(r=>r.json()).then(data=>{
  const ch=data.chapters[id];

  document.getElementById('chapter').innerHTML=`
    <img src="https://ah-img.luscious.net/KOKOMIEL/370689/pagina-1_01E5WK2S3KNPQVT239DB9J006B.1680x0.jpg">

    <h1>${ch.title}</h1>
    <p>${ch.desc}</p>

    ${ch.pages.map(p=>`<img src="${p}">`).join('')}
  `;
});
</script>

</body>
</html>
