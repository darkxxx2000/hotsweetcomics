<header>
  <h1>Doujinshi Series</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="doujinshi.html">Doujinshi</a>

<main>
  <section id="series" class="grid"></section>
</main>

<footer>
  &copy; 2026 Doujinshi Hub. All rights reserved.
</footer>

<script>
const seriesContainer = document.getElementById('series');
const series = [
  {title:"Franchise 1", img:"https://ah-img.luscious.net/KOKOMIEL/370689/pagina-1_01E5WK2S3KNPQVT239DB9J006B.1680x0.jpg", link:"chapter.html?series=1"},
  {title:"Franchise 2", img:"https://ah-img.luscious.net/KOKOMIEL/370689/pagina-2.jpg", link:"chapter.html?series=2"}
];
series.forEach((s, idx)=>{
  const div = document.createElement('div');
  div.className='card';
  div.style.border = idx % 2 === 0 ? "3px solid #ff00c8" : "3px solid #00ffff";
  div.innerHTML = `<img src="${s.img}" alt="${s.title}"><p>${s.title}</p>`;
  div.onclick = ()=> window.location.href = s.link;
  seriesContainer.appendChild(div);
});
</script>

</body>
</html>
