<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doujinshi</title>
<style>
body{background:#000;color:#fff;font-family:Arial;padding:40px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:30px;
}
.card{
  padding:15px;
  border:4px solid #ff00aa;
  border-radius:12px;
  text-align:center;
}
.card img{
  width:100%;
  border-radius:8px;
}
.card h2{
  margin:10px 0;
}
</style>
</head>
<body>

<h1>Doujinshi Series</h1>
<div class="grid" id="list"></div>

<script>
fetch('data.json').then(r=>r.json()).then(data=>{
  const container=document.getElementById('list');

  data.sections.doujinshi.forEach(d=>{
    container.innerHTML+=`
      <a href="comic.html?id=${d.id}" style="text-decoration:none;color:white">
        <div class="card">
          <img src="https://ah-img.luscious.net/KOKOMIEL/370689/pagina-1_01E5WK2S3KNPQVT239DB9J006B.1680x0.jpg">
          <h2>${d.title}</h2>
        </div>
      </a>`;
  });
});
</script>

</body>
</html>
