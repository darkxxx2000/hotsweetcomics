<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doujinshi - HOT SWEET COMICS</title>
<link rel="stylesheet" href="estilos.css">
</head>
<body>

<header>
  <h1>HOT SWEET COMICS</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="doujinshi.html">Doujinshi</a>
    <a href="gallery.html">Gallery</a>
    <a href="shortcomics.html">Short Comics</a>
    <a href="post.html">Post</a>
    <a href="ai.html">AI</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="grid" id="grid"></main>

<script>
const params = new URLSearchParams(location.search);
const serieID = params.get("serie");

fetch("data.json")
.then(r=>r.json())
.then(data=>{
  const grid=document.getElementById("grid");

  if(!serieID){
    // MOSTRAR SERIES
    data.series.forEach(serie=>{
      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`
        <img src="${serie.portada}">
        <p>${serie.nombre}</p>
      `;
      div.onclick=()=>{
        location.href=`doujinshi.html?serie=${serie.id}`;
      };
      grid.appendChild(div);
    });

  }else{
    // MOSTRAR CAPÍTULOS
    const serie = data.series.find(s=>s.id===serieID);
    serie.capitulos.forEach((cap,i)=>{
      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`
        <img src="${cap.portada}">
        <p>${cap.titulo}</p>
      `;
      div.onclick=()=>{
        location.href=`viewer.html?serie=${serieID}&cap=${i}`;
      };
      grid.appendChild(div);
    });
  }
});
</script>

</body>
</html>
