<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doujinshi - Series</title>
<link rel="stylesheet" href="estilos.css">
</head>
<body>
<header>
  <h1>Doujinshi Series</h1>
  <hr>
</header>

<main>
  <section id="series"></section>
  <a href="index.html"><button class="main-btn">Volver al inicio</button></a>
</main>

<script>
const seriesContainer = document.getElementById('series');

fetch('data.json')
  .then(res => res.json())
  .then(data => {
    data.series.forEach(s => {
      const div = document.createElement('div');
      div.className = 'serie-card';
      div.style.border = "2px solid #FF00FF"; // borde color a elección
      div.innerHTML = `
        <a href="comic.html?id=${s.id}">
          <img src="${s.portada}" alt="${s.nombre}">
          <p>${s.nombre}</p>
        </a>`;
      seriesContainer.appendChild(div);
    });
  });
</script>
</body>
</html>
