<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOT SWEET COMICS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #000 0%, #1b0022 100%);
    color:#fff;
}

header{text-align:center;padding:40px 20px 10px;}
h1{
    font-size:52px;margin:0;color:#fff;
    text-shadow:0 0 6px #800000,0 0 14px #800000,0 0 28px #ff003c;
}
h2{margin-top:10px;color:#ddd;letter-spacing:6px;font-weight:normal;}

.navbar{text-align:center;margin:25px 0;}
.navbar a{
    margin:6px 8px;padding:10px 18px;
    background:#2a0033;color:#fff;text-decoration:none;
    border-radius:6px;font-weight:bold;
}
.navbar a:hover{background:#4a005a;box-shadow:0 0 10px #ff003c;}

section{max-width:1100px;margin:auto;padding:40px 20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}

.comic-card{
    background:#111;border-radius:8px;padding:10px;cursor:pointer;
}
.comic-card img{width:100%;border-radius:6px;}
.comic-title{margin-top:8px;color:#ff66aa;font-size:18px;text-align:center;}

.viewer{display:none;margin-top:30px;}
.viewer-header{display:flex;gap:20px;align-items:flex-start;}
.viewer-header img{width:260px;border-radius:8px;}
.viewer-text{flex:1;}
.viewer-text h3{color:#ff66aa;margin-top:0;}
.viewer-pages img{width:100%;margin-top:15px;border-radius:6px;}

.back-btn{
    margin:20px 0;display:inline-block;
    background:#4a005a;padding:8px 16px;border-radius:6px;
    cursor:pointer;
}

footer{text-align:center;padding:25px;background:#111;color:#888;font-size:14px;}
footer a{color:#ff66aa;text-decoration:none;margin:0 10px;}
</style>
</head>
<body>

<header>
    <h1>HOT SWEET COMICS</h1>
    <h2>MAGMA DOUX</h2>
</header>

<div class="navbar">
    <a href="#doujinshi">DOUJINSHI</a>
    <a href="#gallery">GALLERY</a>
    <a href="#short">SHORT COMICS</a>
    <a href="#ai">AI</a>
    <a href="#contact">CONTACT</a>
</div>

<section id="doujinshi"><h2>Doujinshi</h2><div class="grid" id="doujinshi-grid"></div></section>
<section id="gallery"><h2>Gallery</h2><div class="grid" id="gallery-grid"></div></section>
<section id="short"><h2>Short Comics</h2><div class="grid" id="short-grid"></div></section>
<section id="ai"><h2>AI Comics</h2><div class="grid" id="ai-grid"></div></section>

<section id="viewer" class="viewer"></section>

<section id="contact">
    <h2>Contact</h2>
    <p>your-email@example.com</p>
</section>

<footer>
    <a href="#">Usage</a> |
    <a href="#">Privacy Policy</a> |
    <a href="#">Terms & Conditions</a>
</footer>

<script>
let DATA = {};

fetch('comics.json')
.then(res=>res.json())
.then(data=>{
    DATA = data;
    ['doujinshi','gallery','short','ai'].forEach(sec=>{
        const grid = document.getElementById(sec+'-grid');
        data[sec].forEach((comic,i)=>{
            const card = document.createElement('div');
            card.className='comic-card';
            card.innerHTML=`
                <img src="${comic.cover}">
                <div class="comic-title">${comic.title}</div>
            `;
            card.onclick=()=>openComic(sec,i);
            grid.appendChild(card);
        });
    });
});

function openComic(section,index){
    const comic = DATA[section][index];
    const viewer = document.getElementById('viewer');
    viewer.style.display='block';
    viewer.innerHTML=`
        <div class="back-btn" onclick="closeViewer()">← Back</div>
        <div class="viewer-header">
            <img src="${comic.cover}">
            <div class="viewer-text">
                <h3>${comic.title}</h3>
                <p>${comic.desc}</p>
            </div>
        </div>
        <div class="viewer-pages">
            ${comic.pages.map(p=>`<img src="${p}">`).join('')}
        </div>
    `;
    location.hash = "viewer";
}

function closeViewer(){
    document.getElementById('viewer').style.display='none';
}
</script>

</body>
</html>
