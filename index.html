<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOT SWEET COMICS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#000,#1b0022);
  color:#fff;
}
header{text-align:center;padding:40px 20px 10px;}
h1{
  font-size:52px;margin:0;color:#fff;
  text-shadow:0 0 6px #800000,0 0 14px #800000,0 0 28px #ff003c;
}
h2{margin-top:10px;color:#ddd;letter-spacing:6px;font-weight:normal;}
.navbar{text-align:center;margin:25px 0;}
.navbar a{
  margin:6px 8px;padding:10px 18px;background:#2a0033;
  color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;
}
section{max-width:1100px;margin:auto;padding:40px 20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
.card{background:#111;padding:10px;border-radius:8px;text-align:center;}
.card img{width:100%;border-radius:6px;}
.card h3{color:#ff66aa;}
</style>
</head>
<body>

<header>
  <h1>HOT SWEET COMICS</h1>
  <h2>MAGMA DOUX</h2>
</header>

<div class="navbar">
  <a href="#doujinshi">DOUJINSHI</a>
  <a href="#gallery">GALLERY</a>
  <a href="#short">SHORT COMICS</a>
  <a href="#ai">AI</a>
</div>

<section id="doujinshi"><h2>Doujinshi</h2><div class="grid" id="doujinshi"></div></section>
<section id="gallery"><h2>Gallery</h2><div class="grid" id="gallery"></div></section>
<section id="short"><h2>Short Comics</h2><div class="grid" id="short"></div></section>
<section id="ai"><h2>AI Comics</h2><div class="grid" id="ai"></div></section>

<script>
fetch('data.json').then(r=>r.json()).then(data=>{
  Object.keys(data.sections).forEach(sec=>{
    const container=document.getElementById(sec);
    data.sections[sec].forEach(c=>{
      container.innerHTML+=`
        <div class="card">
          <a href="comic.html?id=${c.id}">
            <img src="${c.cover}">
            <h3>${c.title}</h3>
          </a>
        </div>`;
    });
  });
});
</script>

</body>
</html>
