<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doujinshi Hub</title>
<link rel="stylesheet" href="estilos.css">
<style>
  /* Reset y básico */
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Poppins', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* Hero central */
  .hero {
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex:1;
    padding:50px 20px;
  }

  .hero h1 {
    font-size:4rem;
    font-weight:800;
    margin-bottom:20px;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.7);
  }

  .hero p {
    font-size:1.2rem;
    margin-bottom:40px;
    color: rgba(255,255,255,0.8);
  }

  .hero a.button {
    padding:20px 50px;
    font-size:1.5rem;
    font-weight:600;
    color:#fff;
    background: linear-gradient(90deg,#ff005c,#ff00c8);
    border:none;
    border-radius:12px;
    text-decoration:none;
    transition: all 0.3s ease;
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
  }

  .hero a.button:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 12px 25px rgba(0,0,0,0.5);
  }

  footer {
    text-align:center;
    padding:15px 0;
    background: rgba(0,0,0,0.3);
    font-size:0.9rem;
    color: rgba(255,255,255,0.7);
  }
</style>
</head>
<body>

<div class="hero">
  <h1>Doujinshi Hub</h1>
  <p>Explora tus series y capítulos favoritos con un diseño moderno y elegante.</p>
  <a href="doujinshi.html" class="button">Ir a Doujinshi</a>
</div>

<footer>
  &copy; 2026 Doujinshi Hub. Todos los derechos reservados.
</footer>

</body>
</html>
