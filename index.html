<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOT SWEET COMICS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#000,#1b0022);
  color:#fff;
}
header{text-align:center;padding:40px 20px 10px;}
h1{
  font-size:52px;margin:0;color:#fff;
  text-shadow:0 0 6px #800000,0 0 14px #800000,0 0 28px #ff003c;
}
h2{margin-top:10px;color:#ddd;letter-spacing:6px;font-weight:normal;}

.layout{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:30px;
  max-width:1200px;
  margin:auto;
  padding:30px;
}

.sidebar{
  background:#0c0012;
  padding:20px;
  border-radius:10px;
}

.sidebar h3{
  border-bottom:1px solid #444;
  padding-bottom:10px;
}

.filter a{
  display:block;
  color:#ff66aa;
  margin:6px 0;
  text-decoration:none;
  cursor:pointer;
}

.post{
  display:flex;
  gap:20px;
  margin-bottom:40px;
  padding:15px;
  border:2px solid #ff0066;
  border-radius:10px;
}

.post:nth-child(even){
  flex-direction:row-reverse;
  border-color:#9900ff;
}

.post img{
  width:260px;
  border-radius:8px;
}

.post h3{color:#ff66aa;margin:0;}
</style>
</head>
<body>

<header>
  <h1>HOT SWEET COMICS</h1>
  <h2>MAGMA DOUX</h2>
</header>

<div class="layout">
  <div class="sidebar">
    <h3>Genre</h3>
    <div id="genres" class="filter"></div>

    <h3>Series</h3>
    <div id="series" class="filter"></div>

    <h3>Character</h3>
    <div id="characters" class="filter"></div>
  </div>

  <div id="posts"></div>
</div>

<script>
let ALL_POSTS=[];

fetch('data.json').then(r=>r.json()).then(data=>{
  ALL_POSTS=data.posts;
  renderPosts(ALL_POSTS);
  buildFilters(ALL_POSTS);
});

function renderPosts(posts){
  const container=document.getElementById('posts');
  container.innerHTML='';
  posts.forEach(p=>{
    container.innerHTML+=`
      <a href="${p.link}" style="text-decoration:none;color:white">
        <div class="post">
          <img src="${p.image}">
          <div>
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
          </div>
        </div>
      </a>`;
  });
}

function buildFilters(posts){
  const genres=new Set();
  const series=new Set();
  const characters=new Set();

  posts.forEach(p=>{
    p.genre.forEach(g=>genres.add(g));
    series.add(p.series);
    p.character.forEach(c=>characters.add(c));
  });

  fill('genres',genres,'genre');
  fill('series',series,'series');
  fill('characters',characters,'character');
}

function fill(id,set,type){
  const el=document.getElementById(id);
  set.forEach(v=>{
    el.innerHTML+=`<a onclick="filter('${type}','${v}')">${v}</a>`;
  });
}

function filter(type,value){
  const filtered=ALL_POSTS.filter(p=>{
    if(type==='genre') return p.genre.includes(value);
    if(type==='series') return p.series===value;
    if(type==='character') return p.character.includes(value);
  });
  renderPosts(filtered);
}
</script>

</body>
</html>
