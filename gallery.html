<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>
body{margin:0;background:#0b0b0b;font-family:Arial;color:#fff;}
header{padding:20px 40px;font-size:26px;border-bottom:1px solid #222;background:#111;}
.grid{
  column-count:5;
  column-gap:15px;
  padding:30px 40px;
}
.card{
  break-inside:avoid;
  margin-bottom:15px;
  border-radius:10px;
  overflow:hidden;
}
.card img{
  width:100%;
  display:block;
  transition:.3s;
}
.card img:hover{
  transform:scale(1.04);
}
</style>
</head>
<body>

<header>Gallery</header>
<div class="grid" id="grid"></div>

<script>
fetch("gallery.json")
.then(r=>r.json())
.then(data=>{
  const grid=document.getElementById("grid");

  data.imagenes.forEach(img=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<img src="${img.url}" alt="">`;
    grid.appendChild(card);
  });
});
</script>

</body>
</html>
