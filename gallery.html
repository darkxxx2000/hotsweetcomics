<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - HOT SWEET COMICS</title>
<link rel="stylesheet" href="estilos.css">
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@9.4.0/dist/panzoom.min.js"></script>
</head>
<body>

<header>
  <h1>HOT SWEET COMICS</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="doujinshi.html">Doujinshi</a>
    <a href="gallery.html">Gallery</a>
    <a href="shortcomics.html">Short Comics</a>
    <a href="post.html">Post</a>
    <a href="ai.html">AI</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <section id="thumbnails" class="grid"></section>
</main>

<div id="viewer">
  <span id="close">&times;</span>
  <img id="viewer-img">
</div>

<footer>
  <p>
    <a href="usage.html">Usage</a> |
    <a href="privacy.html">Privacy Policy</a> |
    <a href="terms.html">Terms & Conditions</a>
  </p>
</footer>

<script>
const images = [
  "IMAGE_URL_1",
  "IMAGE_URL_2",
  "IMAGE_URL_3"
];

const thumbs = document.getElementById('thumbnails');
const viewer = document.getElementById('viewer');
const viewerImg = document.getElementById('viewer-img');
let index = 0;

images.forEach((src,i)=>{
  const img=document.createElement('img');
  img.src=src;
  img.onclick=()=>openViewer(i);
  thumbs.appendChild(img);
});

function openViewer(i){
  index=i;
  viewer.style.display='flex';
  viewerImg.src=images[index];
  panzoom(viewerImg,{maxZoom:5,minZoom:0.5});
}

document.getElementById('close').onclick=()=>viewer.style.display='none';

document.addEventListener('keydown',(e)=>{
  if(viewer.style.display==='flex'){
    if(e.key==='ArrowRight') change(1);
    if(e.key==='ArrowLeft') change(-1);
  }
});

function change(step){
  index=(index+step+images.length)%images.length;
  viewerImg.src=images[index];
}
</script>

</body>
</html>
