<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capítulos</title>
<link rel="stylesheet" href="estilos.css">
<style>
body {
  font-family: 'Poppins', Arial, sans-serif;
  background: linear-gradient(135deg, #1f1c2c, #302b63, #24243e);
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

header {
  text-align:center;
  margin-bottom:40px;
}

header h1 {
  font-size:3rem;
  font-weight:800;
  margin-bottom:10px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
}

header p {
  font-size:1.2rem;
  color: rgba(255,255,255,0.8);
}

#capitulos {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap:30px;
  width:100%;
  max-width:1200px;
}

.capitulo-card {
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition: all 0.3s ease;
  border: 3px solid #00ffff;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.capitulo-card:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 12px 25px rgba(0,0,0,0.5);
}

.capitulo-card img {
  width:100%;
  height:auto;
  object-fit:cover;
}

.capitulo-card p {
  margin:10px 0;
  font-size:1.2rem;
  font-weight:600;
  color:#fff;
}

.main-btn {
  padding:10px 20px;
  margin:20px;
  font-size:16px;
  cursor:pointer;
  border-radius:12px;
  border:none;
  background: #ff0080;
  font-weight:600;
  color:#fff;
  transition: all 0.3s ease;
}

.main-btn:hover {
  background:#e60073;
  transform: translateY(-3px) scale(1.05);
}

footer {
  text-align:center;
  padding:15px 0;
  font-size:0.9rem;
  color: rgba(255,255,255,0.7);
  margin-top:40px;
}
</style>
</head>
<body>

<header>
  <h1>Capítulos</h1>
  <p>Selecciona un capítulo para ver el contenido completo.</p>
</header>

<main>
  <section id="capitulos"></section>
  <a href="doujinshi.html"><button class="main-btn">Volver a Doujinshi</button></a>
</main>

<footer>
  &copy; 2026 Doujinshi Hub. Todos los derechos reservados.
</footer>

<script>
const capitulosContainer = document.getElementById('capitulos');
const params = new URLSearchParams(window.location.search);
const serieId = params.get('id');

fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const serie = data.series.find(s => s.id === serieId);
    if (!serie) return;
    serie.capitulos.forEach((cap, idx) => {
      const div = document.createElement('div');
      div.className = 'capitulo-card';
      div.style.border = idx % 2 === 0 ? "3px solid #00ffff" : "3px solid #ff00c8";
      div.innerHTML = `
        <a href="chapter.html?id=${serie.id}&cap=${idx}">
          <img src="${cap.portada}" alt="${cap.titulo}">
          <p>${cap.titulo}</p>
        </a>`;
      capitulosContainer.appendChild(div);
    });
  });
</script>

</body>
</html>
