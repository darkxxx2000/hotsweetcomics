<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capítulos</title>
<link rel="stylesheet" href="estilos.css">
</head>
<body>
<header>
  <h1>Capítulos</h1>
  <hr>
</header>

<main>
  <section id="capitulos"></section>
  <a href="doujinshi.html"><button class="main-btn">Volver a Doujinshi</button></a>
</main>

<script>
const capitulosContainer = document.getElementById('capitulos');
const params = new URLSearchParams(window.location.search);
const serieId = params.get('id');

fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const serie = data.series.find(s => s.id === serieId);
    if (!serie) return;
    serie.capitulos.forEach((cap, index) => {
      const div = document.createElement('div');
      div.className = 'capitulo-card';
      div.style.border = "2px solid #00FFFF"; // borde de capítulos
      div.innerHTML = `
        <a href="chapter.html?id=${serie.id}&cap=${index}">
          <img src="${cap.portada}" alt="${cap.titulo}">
          <p>${cap.titulo}</p>
        </a>`;
      capitulosContainer.appendChild(div);
    });
  });
</script>
</body>
</html>
