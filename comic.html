<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comic</title>
<style>
body{background:#000;color:#fff;font-family:Arial;padding:40px;}
.chapter{
  margin:30px 0;
  border:3px solid #9900ff;
  padding:15px;
  border-radius:10px;
}
.chapter img{width:220px;display:block;margin-bottom:10px;}
</style>
</head>
<body>

<div id="comic"></div>

<script>
const id=new URLSearchParams(location.search).get('id');

fetch('data.json').then(r=>r.json()).then(data=>{
  const comic=data.comics[id];

  let html=`
    <h1>${comic.title}</h1>
    <p>${comic.desc}</p>
  `;

  comic.chapters.forEach(ch=>{
    html+=`
      <a href="chapter.html?id=${ch.id}" style="text-decoration:none;color:white">
        <div class="chapter">
          <img src="https://ah-img.luscious.net/KOKOMIEL/370689/pagina-1_01E5WK2S3KNPQVT239DB9J006B.1680x0.jpg">
          <h3>${ch.title}</h3>
        </div>
      </a>
    `;
  });

  document.getElementById('comic').innerHTML=html;
});
</script>

</body>
</html>
